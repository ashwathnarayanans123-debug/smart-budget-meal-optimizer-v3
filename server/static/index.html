<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Meal Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --primary: #8b5cf6;
            --hunger: #ef4444;
            --budget: #facc15;
            --health: #10b981;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 🌆 Background Glow Effect */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        /* 🏗️ Layout */
        header {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
        }

        main {
            width: 100%;
            max-width: 800px;
            padding: 0 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 📊 Status Dashboard */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .status-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
        }

        .status-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #hunger-val { color: var(--hunger); }
        #hunger-bar { background: var(--hunger); }
        #budget-val { color: var(--budget); }
        #budget-bar { background: var(--budget); }
        #health-val { color: var(--health); }
        #health-bar { background: var(--health); }

        /* 🎮 Controls */
        .actions-section {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .secondary-actions {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .reset-link {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .reset-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: var(--hunger);
        }

        .reward-info {
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            min-height: 1.5rem;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        /* 🧠 AI Insight Box */
        .ai-insight-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--primary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { border-color: rgba(139, 92, 246, 0.3); }
            50% { border-color: rgba(139, 92, 246, 1); }
            100% { border-color: rgba(139, 92, 246, 0.3); }
        }

        .ai-label {
            font-weight: 800;
            color: var(--primary);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .ai-text {
            font-size: 0.9rem;
            color: var(--text-main);
            font-style: italic;
        }

        /* 📜 Activity Log */
        .log-container {
            margin-top: 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .log-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-action { font-weight: 600; }
        .log-impact { color: var(--text-muted); }

        /* 🏆 Strategy Badge */
        .strategy-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .strat-saver { background: var(--budget); color: #000; }
        .strat-healthy { background: var(--health); color: #fff; }
        .strat-risky { background: var(--hunger); color: #fff; }
        .strat-balanced { background: var(--primary); color: #fff; }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .action-btn {
            padding: 25px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-inner {
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            z-index: 1;
        }

        .btn-sub {
            font-size: 0.75rem;
            opacity: 0.8;
            color: #fff;
            z-index: 1;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .salad-btn { background: var(--health); }
        .burger-btn { background: var(--hunger); }
        .rice-btn { background: #3b82f6; }

        /* 💬 Feedback Overlay */
        #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .over-card {
            background: var(--card);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .over-card h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .over-stats { margin: 20px 0; color: var(--text-muted); line-height: 1.6; }
        .reset-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 📱 Tablet/Mobile Tweaks */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .status-grid { grid-template-columns: 1fr; }
            .btn-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="game-over">
        <div class="over-card">
            <h2 id="end-title">TASK OVER</h2>
            <div id="end-stats" class="over-stats"></div>
            <button class="reset-btn" onclick="init()">START NEW SIMULATION</button>
        </div>
    </div>

    <header>
        <h1>Smart Budget Meal Optimizer</h1>
        <p>Balance your hunger, health, and budget</p>
    </header>

    <main>
        <div class="status-grid">
            <div class="status-card">
                <span class="icon">🍕</span>
                <span class="label">Hunger</span>
                <span id="hunger-val" class="value">0</span>
                <div class="bar-container">
                    <div id="hunger-bar" class="bar-fill"></div>
                </div>
            </div>
            <div class="status-card">
                <span class="icon">💰</span>
                <span class="label">Budget</span>
                <span id="budget-val" class="value">₹0</span>
                <div class="bar-container">
                    <div id="budget-bar" class="bar-fill"></div>
                </div>
            </div>
            <div class="status-card">
                <span class="icon">❤</span>
                <span class="label">Health</span>
                <span id="health-val" class="value">0</span>
                <div class="bar-container">
                    <div id="health-bar" class="bar-fill"></div>
                </div>
            </div>
        </div>

        <section class="actions-section">
            <div id="reward-info" class="reward-info">Welcome! Choose a meal to start.</div>
            
            <div class="ai-insight-box">
                <span class="ai-label">AI Advisor</span>
                <span id="ai-text" class="ai-text">Analyzing your situation...</span>
            </div>

            <div class="btn-grid">
                <button class="action-btn salad-btn" onclick="handleAction('salad')">
                    <span class="icon">🥗</span>
                    <span class="btn-inner">Salad</span>
                    <span class="btn-sub">Healthy & Low</span>
                </button>
                <button class="action-btn burger-btn" onclick="handleAction('burger')">
                    <span class="icon">🍔</span>
                    <span class="btn-inner">Burger</span>
                    <span class="btn-sub">Reduce Hunger</span>
                </button>
                <button class="action-btn rice-btn" onclick="handleAction('rice')">
                    <span class="icon">🍚</span>
                    <span class="btn-inner">Rice</span>
                    <span class="btn-sub">Balanced</span>
                </button>
            </div>

            <div class="log-container">
                <div class="log-title">
                    <span>Decision Log</span>
                    <span id="strategy-display" class="strategy-badge strat-balanced">Balanced</span>
                </div>
                <div id="activity-log">
                    <!-- Log entries here -->
                </div>
            </div>

            <div class="secondary-actions">
                <button class="reset-link" onclick="init()">♻ Reset Simulation</button>
            </div>
        </section>
    </main>

    <script>
        let currentStatus = { hunger: 10, budget: 100, health: 10, done: false };

        async function api(path, body = null) {
            const options = {
                method: body ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            try {
                const res = await fetch(path, options);
                if (!res.ok) {
                    const errTxt = await res.text();
                    console.error("API Error Response:", errTxt);
                    showMessage("API Error: " + res.status, "var(--hunger)");
                    return null;
                }
                const data = await res.json();
                return data;
            } catch (e) {
                console.error("Fetch error", e);
                showMessage("Connection Failed", "var(--hunger)");
                return null;
            }
        }

        function updateUI(data) {
            if (!data) return;
            
            // The framework might wrap the observation differently depending on version
            let obs = data.observation || data;
            if (obs && obs.observation !== undefined && obs.hunger === undefined) {
                obs = obs.observation; // Handle double-wrapping from TicketReward
            }
            
            const reward = data.reward !== undefined ? data.reward : null;
            
            currentStatus = obs;
            const hunger = obs.hunger !== undefined ? obs.hunger : 0;
            const budget = obs.budget !== undefined ? obs.budget : 0;
            const health = obs.health !== undefined ? obs.health : 0;

            // Values
            document.getElementById('hunger-val').innerText = hunger;
            document.getElementById('budget-val').innerText = `₹${budget}`;
            document.getElementById('health-val').innerText = health;

            // Bars
            document.getElementById('hunger-bar').style.width = (hunger * 10) + '%';
            document.getElementById('budget-bar').style.width = (budget) + '%';
            document.getElementById('health-bar').style.width = (health * 10) + '%';

            // Reward/Feedback
            if (reward !== null) {
                const info = document.getElementById('reward-info');
                info.innerText = `Reward: ${reward > 0 ? '+' : ''}${reward.toFixed(2)}`;
                info.style.color = reward > 0 ? 'var(--health)' : 'var(--hunger)';
            }

            updateAIAdvisor(obs);
            updateStrategy(obs);

            if (data.done) {
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('end-title').innerText = budget === 0 || health === 0 ? "FAILURE" : "SUCCESS!";
                const finalMsg = budget === 0 ? "You ran out of money!" : 
                               (health === 0 ? "Your health failed!" : "Goal reached!");
                document.getElementById('end-stats').innerText = `${finalMsg} | Score: ${reward?.toFixed(2) || 'N/A'}`;
            }
        }

        function updateAIAdvisor(obs) {
            const aiText = document.getElementById('ai-text');
            if (obs.budget < 25) {
                aiText.innerText = "Budget is critical. Stick to Rice and Salad.";
            } else if (obs.health < 4) {
                aiText.innerText = "Health warning! Avoid Burgers. Eat Salad immediately.";
            } else if (obs.hunger > 7) {
                aiText.innerText = "Hunger is high. A Burger would be most efficient now.";
            } else {
                aiText.innerText = "Everything looks stable. Rice is your best balanced move.";
            }
        }

        function updateStrategy(obs) {
            const badge = document.getElementById('strategy-display');
            if (obs.health > 8 && obs.budget < 40) {
                badge.innerText = "Frugal Healthy";
                badge.className = "strategy-badge strat-healthy";
            } else if (obs.budget > 80) {
                badge.innerText = "Big Spender";
                badge.className = "strategy-badge strat-risky";
            } else if (obs.health < 5) {
                badge.innerText = "Unhealthy Path";
                badge.className = "strategy-badge strat-risky";
            } else {
                badge.innerText = "Balanced";
                badge.className = "strategy-badge strat-balanced";
            }
        }

        function addToLog(food, obs) {
            const log = document.getElementById('activity-log');
            const item = document.createElement('div');
            item.className = 'log-item';
            const icon = food === 'salad' ? '🥗' : (food === 'burger' ? '🍔' : '🍚');
            item.innerHTML = `
                <span class="log-action">${icon} ${food.charAt(0).toUpperCase() + food.slice(1)}</span>
                <span class="log-impact">H:${obs.hunger} | B:${obs.budget} | L:${obs.health}</span>
            `;
            log.prepend(item);
            if (log.children.length > 5) log.removeChild(log.lastChild);
        }

        function showMessage(msg, color) {
            const info = document.getElementById('reward-info');
            const original = info.innerText;
            info.innerText = msg;
            info.style.color = color;
            setTimeout(() => {
                if (info.innerText === msg) {
                    info.innerText = original;
                    info.style.color = "var(--text-muted)";
                }
            }, 2000);
        }

        async function handleAction(food) {
            const data = await api('/step', { action: { food } });
            updateUI(data);
            if (data.observation) addToLog(food, data.observation);
        }

        async function init() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('activity-log').innerHTML = '';
            const data = await api('/reset', { task_id: 'medium' });
            updateUI(data);
            document.getElementById('reward-info').innerText = "Simulation Started. Choose wisely!";
        }

        window.onload = init;
    </script>
</body>
</html>
